<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - متجر الأزياء الرجالية</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
        }
        .form-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        .form-title {
            margin-top: 0;
            color: #1a1a1a;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }
        .form-group textarea {
            min-height: 120px;
        }
        .submit-btn {
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            background-color: #c9a227;
        }
        .image-preview {
            max-width: 200px;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    {% include 'store/header.html' %}
    
    <div class="form-container">
        <h1 class="form-title">{{ title }}</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="id_name">اسم المنتج</label>
                {{ form.name }}
            </div>
            
            <div class="form-group">
                <label for="id_category">الفئة</label>
                {{ form.category }}
            </div>
            
            <div class="form-group">
                <label for="id_price">السعر (دج)</label>
                {{ form.price }}
            </div>
            
            <div class="form-group">
                <label for="id_stock">الكمية المتاحة</label>
                {{ form.stock }}
            </div>
            
            <div class="form-group">
                <label for="id_description">وصف المنتج</label>
                {{ form.description }}
            </div>
            
            <div class="form-group">
                <label for="id_image">صورة المنتج</label>
                {{ form.image }}
                {% if form.instance.image %}
                <img id="image-preview" src="{{ form.instance.image.url }}" alt="Preview" class="image-preview">
                {% else %}
                <img id="image-preview" src="#" alt="Preview" class="image-preview">
                {% endif %}
            </div>
            
            <button type="submit" class="submit-btn">حفظ</button>
        </form>
    </div>
    
    <script>
        // عرض معاينة الصورة قبل الرفع
        document.getElementById('id_image').addEventListener('change', function(e) {
            const preview = document.getElementById('image-preview');
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                
                reader.readAsDataURL(this.files[0]);
            }
        });
    </script>
</body>
</html>
