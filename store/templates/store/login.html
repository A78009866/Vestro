{% block content %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر الأزياء الرجالية</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: 1rem;
        }
        
        .brand-logo {
            color: #000000;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .brand-name {
            color: #000000;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .brand-slogan {
            color: #666666;
            margin-bottom: 2rem;
        }
        
        .login-title {
            color: #000000;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: right;
        }
        
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #000000;
            font-weight: bold;
        }
        
        .form-input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #dddddd;
            border-radius: 4px;
            font-family: inherit;
            background-color: #ffffff;
            color: #333333;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
        }
        
        .btn-login {
            background-color: #d4af37;
            color: #000000;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        
        .btn-login:hover {
            background-color: #c9a227;
            transform: translateY(-2px);
        }
        
        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 0.8rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        footer {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 1rem;
            width: 100%;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-logo">👔</div>
        <h1 class="brand-name">Vestro</h1>
        <p class="brand-slogan">متجر الأزياء الرجالية</p>
        
        <h2 class="login-title">
            <span>تسجيل الدخول</span>
            <span>🔐</span>
        </h2>
        
        {% if form.errors %}
        <div class="error-message">
            <span>⚠️</span>
            <span>اسم المستخدم أو كلمة المرور غير صحيحة</span>
        </div>
        {% endif %}
        
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username" class="form-label">اسم المستخدم</label>
                <input type="text" name="username" id="id_username" class="form-input" required>
            </div>
            
            <div class="form-group">
                <label for="id_password" class="form-label">كلمة المرور</label>
                <input type="password" name="password" id="id_password" class="form-input" required>
            </div>
            
            <button type="submit" class="btn-login">دخول</button>
        </form>
    </div>
    
    <footer>
        <p>&copy; 2023 متجر الأزياء الرجالية. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.style.borderColor = '#d4af37';
                this.style.boxShadow = '0 0 0 2px rgba(212, 175, 55, 0.3)';
            });
            
            input.addEventListener('blur', function() {
                this.style.borderColor = '#dddddd';
                this.style.boxShadow = 'none';
            });
        });
    </script>
</body>
</html>
{% endblock %}
