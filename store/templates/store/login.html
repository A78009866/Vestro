{% block content %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر الهواتف</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            100: '#1a1a1a',
                            200: '#2d2d2d',
                            300: '#3d3d3d',
                        },
                        light: {
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #1a1a1a;
            color: #f3f4f6;
        }
        .login-container {
            background-color: #2d2d2d;
            border: 1px solid #3d3d3d;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .form-input {
            background-color: #3d3d3d !important;
            color: #f3f4f6 !important;
            border-color: #4b5563 !important;
        }
        .form-input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        .form-label {
            color: #d1d5db !important;
        }
        .btn-login:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }
        .error-message {
            background-color: #7f1d1d !important;
            border-color: #991b1b !important;
            color: #fee2e2 !important;
        }
        .brand-text {
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="font-sans">
    <div class="min-h-screen flex items-center justify-center bg-dark-100 p-4">
        <div class="login-container p-8 rounded-xl w-full max-w-md">
            <div class="text-center mb-8">
                <i class="fas fa-mobile-alt text-4xl text-blue-400 mb-3"></i>
                <h2 class="text-3xl font-bold text-blue-400 brand-text">Wael Store</h2>
                <p class="text-light-300 mt-2">متجرك الأول للهواتف الذكية</p>
            </div>
            
            <h2 class="text-2xl font-bold mb-6 text-center text-light-100">
                <i class="fas fa-sign-in-alt mr-2"></i>تسجيل الدخول
            </h2>
            
            {% if form.errors %}
            <div class="error-message px-4 py-3 rounded mb-4 flex items-center">
                <i class="fas fa-exclamation-circle mr-2"></i>
                اسم المستخدم أو كلمة المرور غير صحيحة
            </div>
            {% endif %}
            
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="form-label block mb-2 font-medium">
                        <i class="fas fa-user mr-2 text-blue-400"></i>اسم المستخدم
                    </label>
                    <input type="text" name="username" required 
                           class="form-input w-full px-4 py-3 rounded-lg focus:outline-none transition">
                </div>
                <div>
                    <label class="form-label block mb-2 font-medium">
                        <i class="fas fa-lock mr-2 text-blue-400"></i>كلمة المرور
                    </label>
                    <input type="password" name="password" required 
                           class="form-input w-full px-4 py-3 rounded-lg focus:outline-none transition">
                </div>
                
                <button type="submit" 
                        class="btn-login w-full bg-blue-600 text-white py-3 px-4 rounded-lg transition-all duration-300 flex items-center justify-center">
                    <i class="fas fa-sign-in-alt mr-2"></i> دخول
                </button>
            </form>

            
        </div>
    </div>

    <footer class="absolute bottom-0 w-full py-4 text-center text-gray-500 text-sm">
        <p>© 2025 Wael Store. جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // إضافة تأثيرات عند التركيز على الحقول
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('label').classList.add('text-blue-400');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('label').classList.remove('text-blue-400');
            });
        });
    </script>
</body>
</html>
{% endblock %}
