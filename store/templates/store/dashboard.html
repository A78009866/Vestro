<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - متجر الأزياء الرجالية</title>
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f5f5f5;
            color: #333333;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #dddddd;
        }
        .dashboard-title {
            margin: 0;
            color: #000000;
            font-size: 1.8rem;
        }
        .add-product-btn {
            background-color: #d4af37;
            color: #000000;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .add-product-btn:hover {
            background-color: #c9a227;
            transform: translateY(-2px);
        }
        .dashboard-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .section {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 1px solid #eeeeee;
        }
        .section-title {
            margin-top: 0;
            color: #000000;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eeeeee;
            font-size: 1.4rem;
        }
        .product-item, .order-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 1rem;
            padding: 1rem 0;
            border-bottom: 1px solid #eeeeee;
        }
        .product-item:last-child, .order-item:last-child {
            border-bottom: none;
        }
        .product-item img, .order-item img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #dddddd;
        }
        .product-info h3, .order-info h3 {
            margin: 0 0 0.5rem;
            color: #000000;
        }
        .product-meta, .order-meta {
            color: #666666;
            font-size: 0.9rem;
        }
        .product-status, .order-status {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-active {
            background-color: #e8f5e9;
            color: #2e7d32;
        }
        .status-inactive {
            background-color: #fff8e1;
            color: #ff8f00;
        }
        .product-actions, .order-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        .action-btn {
            padding: 0.5rem 1rem;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }
        .edit-btn {
            background-color: #2196F3;
            color: white;
        }
        .toggle-btn {
            background-color: #4CAF50;
            color: white;
        }
        .delete-btn {
            background-color: #f44336;
            color: white;
        }
        .confirmed {
            background-color: #e8f5e9;
        }
        .confirmed-text {
            color: #2e7d32;
            font-weight: bold;
        }
        .empty-message {
            color: #666666;
            text-align: center;
            padding: 1rem;
        }
        .empty-message a {
            color: #d4af37;
            text-decoration: none;
            font-weight: bold;
        }
        .empty-message a:hover {
            text-decoration: underline;
        }
        @media (max-width: 1024px) {
            .dashboard-sections {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
            .product-item, .order-item {
                grid-template-columns: 1fr;
            }
            .product-actions, .order-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    {% include 'store/header.html' %}
    
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">لوحة التحكم</h1>
            <a href="{% url 'store:add_product' %}" class="add-product-btn">إضافة منتج جديد</a>
        </div>
        
        <div class="dashboard-sections">
            <div class="section">
                <h2 class="section-title">منتجاتي</h2>
                
                {% for product in products %}
                <div class="product-item">
                    <img src="{{ product.image.url }}" alt="{{ product.name }}">
                    <div class="product-info">
                        <h3>{{ product
